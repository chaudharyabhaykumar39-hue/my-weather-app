name: Android APK Build From Zip

on:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Unzip Project File Automatically
      run: |
        ZIP_FILE=$(find . -name "*.zip" | head -n 1)
        if [ -z "$ZIP_FILE" ]; then
          echo "Error: Repository me koi bhi .zip file nahi mili!"
          exit 1
        fi
        echo "Found and unzipping: $ZIP_FILE"
        unzip "$ZIP_FILE"

    - name: Build Debug APK
      run: |
        GRADLEW_PATH=$(find . -name gradlew | head -n 1)
        if [ -z "$GRADLEW_PATH" ]; then
          echo "Error: gradlew file nahi mili!"
          exit 1
        fi
        GRADLEW_DIR=$(dirname "$GRADLEW_PATH")
        cd "$GRADLEW_DIR"
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: WeatherApp-APK
        path: "**/build/outputs/apk/debug/*-debug.apk"
        
